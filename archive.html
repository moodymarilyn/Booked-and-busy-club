<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>books we've read — booked &amp; busy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Special+Elite&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="archive">
  <header class="site-header">
    <span class="tape" style="top:8px; left:calc(50% - 280px); width:90px; transform: rotate(-8deg);"></span>
    <span class="tape" style="top:14px; right:calc(50% - 300px); width:70px; background:var(--washi-yellow); transform: rotate(6deg);"></span>
    <div class="torn-tag">the finished shelf</div>
    <h1>books we've read</h1>
    <div class="tagline">— tape it in, dog-ear it, love it —</div>
    <nav>
      <a href="index.html">← back to the pool</a>
      <button id="signout-btn" class="link-btn hidden">sign out</button>
    </nav>
  </header>

  <main>
    <section id="loading" class="panel center">Loading…</section>

    <section id="login" class="panel hidden">
      <h2>Sign in</h2>
      <p>Enter your email and we'll send you a magic link.</p>
      <form id="login-form">
        <input type="email" id="login-email" placeholder="you@example.com" required>
        <button type="submit" class="btn primary">Send magic link</button>
      </form>
      <p id="login-msg" class="muted"></p>
    </section>

    <section id="not-member" class="panel hidden">
      <h2>Sorry, members only</h2>
      <p>Your email (<span id="nm-email"></span>) isn't on the club list.</p>
      <button id="nm-signout" class="btn">Sign out</button>
    </section>

    <section id="app" class="hidden">
      <div id="archive-list"></div>
      <p id="archive-empty" class="muted hidden">No finished books yet. Get reading!</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="handwriting">booked &amp; busy</div>
    <div class="typewriter">xoxo, keep turning pages</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
